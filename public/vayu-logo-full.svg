<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 130" width="100%" height="100%">

  <!-- Icon: compact, centered above text -->
  <g transform="translate(50, 8) scale(0.92)">

    <!-- Outer dashed circular ring -->
    <circle cx="50" cy="50" r="42" fill="none" stroke="#0E4C53" stroke-width="2.5" stroke-dasharray="18 10" stroke-dashoffset="5"/>

    <!-- Wind / air swirl (left side) -->
    <path d="M14 50 Q28 24 50 36 T50 68 Q30 78 14 50" fill="none" stroke="#0E4C53" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 46 Q36 32 47 42 T43 62" fill="none" stroke="#0E4C53" stroke-width="2" stroke-linecap="round"/>

    <!-- Dot accents -->
    <circle cx="46" cy="50" r="2.8" fill="#0E4C53"/>
    <circle cx="36" cy="68" r="1.8" fill="#0E4C53"/>

    <!-- Footprint body (right) -->
    <path d="M60 74 C52 65, 60 46, 65 36 C70 26, 80 36, 75 55 C70 74, 80 80, 60 74 Z" fill="#3D8B40"/>

    <!-- Toes -->
    <circle cx="84" cy="41" r="2.8" fill="#3D8B40"/>
    <circle cx="89" cy="49" r="2.4" fill="#3D8B40"/>
    <circle cx="92" cy="57" r="2.0" fill="#3D8B40"/>
    <circle cx="93" cy="65" r="1.5" fill="#3D8B40"/>

    <!-- Leaves from top of footprint -->
    <path d="M65 36 Q56 16 66 16 Q71 26 65 36" fill="#58A55C"/>
    <path d="M65 36 Q75 20 85 26 Q75 36 65 36" fill="#58A55C"/>
    <path d="M75 30 Q86 14 96 20 Q86 30 75 30" fill="#58A55C"/>
  </g>

  <!-- VAYU wordmark -->
  <text
    x="150" y="68"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="52"
    fill="#0E4C53"
    letter-spacing="5"
    text-anchor="middle"
  >VAYU</text>

  <!-- Subtitle -->
  <text
    x="150" y="90"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="500"
    font-size="9.5"
    fill="#0E4C53"
    letter-spacing="2.2"
    text-anchor="middle"
  >CARBON FOOTPRINT AWARENESS PLATFORM</text>

</svg>
